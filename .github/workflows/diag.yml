name: diag-rede
on: { workflow_dispatch: {} }
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: baixar ZIP real do TSE
        run: |
          echo "RAM disponível:"; free -h | head -2
          URL=https://cdn.tse.jus.br/estatistica/sead/odsele/consulta_cand/consulta_cand_2022.zip
          echo "== curl (stream p/ disco) =="
          curl -sS -o /tmp/t.zip -w "  HTTP %{http_code} size=%{size_download} t=%{time_total}s\n" --max-time 180 "$URL" || echo "  curl FALHOU"
          ls -lh /tmp/t.zip 2>/dev/null
          echo "== node fetch + arrayBuffer =="
          node -e "const u='$URL'; fetch(u).then(r=>r.arrayBuffer()).then(b=>console.log('  node OK bytes=',b.byteLength)).catch(e=>console.log('  node FALHOU:', e.message, '| cause:', e.cause?.code||e.cause?.message||e.cause))"
