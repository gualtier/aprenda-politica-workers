name: Sync nacional (dados)

on:
  schedule:
    # Dia 1 de cada mês às 06:00 UTC (03:00 BRT) — dados de eleitos são estáveis
    - cron: '0 6 1 * *'
  workflow_dispatch:
    inputs:
      ufs:
        description: 'UFs separadas por vírgula (vazio = todas as 27)'
        required: false
        default: ''

# Evita execuções concorrentes (ex: cron + manual)
concurrency:
  group: sync-nacional
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Rodar sync nacional
        run: npx tsx scripts/run-sync.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VERCEL_REVALIDATE_URL: https://aprenda-politica.vercel.app/api/revalidate
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          UFS: ${{ github.event.inputs.ufs }}
